name: Generate Daily Feed

on:
  schedule:
    # Run daily at 6am UTC (2am ET / 11pm PT previous day)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm install

      # Generate tweets feed
      - name: Generate X/Twitter feed
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: cd scripts && node generate-feed.js --tweets-only
        continue-on-error: true

      # Generate podcast feed
      - name: Generate Podcast feed
        env:
          POD2TXT_API_KEY: ${{ secrets.POD2TXT_API_KEY }}
        run: cd scripts && node generate-feed.js --podcasts-only
        continue-on-error: true

      # Generate blog feed
      - name: Generate Blog feed
        run: cd scripts && node generate-feed.js --blogs-only
        continue-on-error: true

      # Commit and push updated feeds
      - name: Commit feed updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed-*.json state-feed.json
          git diff --cached --quiet || git commit -m "Update feeds $(date -u +%Y-%m-%d)"
          git push
